    prazos:`Prazos críticos para o financeiro se preparar:

▸ Jun/2026 — Manual de Integração Split Payment v1.0 publicado. TI/ERP deve avaliar imediatamente os 6 campos de liquidação e os 3 modos operacionais.
▸ 2026 — Confirmar cadastro CGIBS (Ato Conjunto RFB/CGIBS nº 02/2026). Filiais mesma raiz CNPJ precisam de atenção no domicílio bancário.
▸ Jan/2027 — Extinção do PIS/Cofins. CBS entra em vigor plena. ERP deve estar parametrizado. Revisão de contratos e fornecedores necessária antes dessa data.
▸ 2º semestre 2027 — Split Payment efetivo no B2B (início facultativo). Empresas com vendas a prazo devem ter projeções de fluxo de caixa refeitas.

Ação imediata recomendada: iniciar diagnóstico do ERP e simulação de fluxo de caixa 2027–2033 com recebimento líquido (NF − CBS − IBS).`,

    atencao:`Principais pontos de atenção para o financeiro e contabilidade do varejo:

▸ Float tributário em extinção — O tributo não passará mais pelo caixa a partir do split efetivo (2027). Perda estimada de ~40 dias de capital de giro. Para varejo com cartão parcelado, o impacto é ainda maior.

▸ Precificação precisa ser revisada ao menos 6 vezes até 2033 — Alíquotas de CBS e IBS variam a cada etapa da transição. Contratos de longo prazo devem incluir cláusula de repactuação tributária.
▸ Créditos de IBS/CBS vinculados à NF — O crédito só é válido com NF-e vinculada ao pagamento e CNPJ do fornecedor ativo. Erros na emissão cancelam o crédito automaticamente.

    split:`O Split Payment na Reforma Tributária — cronograma e funcionamento:

O que é: mecanismo que segrega automaticamente CBS e IBS no momento da liquidação financeira. O PSP (banco, gateway) retém o tributo e repassa apenas o valor líquido ao vendedor.

Modalidades previstas:
▸ Split Inteligente Online — NF vinculada em tempo real à transação. PSP separa os campos vlCbsSegr e vlIbsSegr na liquidação.
▸ Split Inteligente Offline — Vinculação posterior com conciliação. Para meios sem integração em tempo real.
▸ Split Simplificado — Percentual fixo retido, sem vinculação por NF. Usado em casos de fallback.

Cronograma:
▸ 2026 — Fase de testes. Alíquota simbólica (~1%). Manual de Integração v1.0 publicado em 03/06/2026. Sem recolhimento efetivo.
▸ 2º sem/2027 — Split efetivo no B2B, início facultativo. Prioridade: Pix e boleto. Cartão de crédito em etapas posteriores.
▸ 2028 — Obrigatoriedade no B2B por Atos Conjuntos RFB/CGIBS.
▸ 2033 — Split obrigatório em todos os meios eletrônicos.

6 campos de liquidação (Manual v1.0): vlPago, vlCbsSegr, vlIbsSegr, vlCbsCorr, vlIbsCorr, vlAberto.

Impacto prático: o financeiro passa a receber NF − CBS − IBS. Toda projeção de fluxo de caixa precisa ser refeita com base no recebimento líquido.`,

    varejo:`Impactos específicos da Reforma Tributária para varejo de moda multimarca:

▸ Capital de giro — O varejo de moda com cartão parcelado é um dos setores mais afetados pelo split. O tributo que ficava no caixa entre a venda e o vencimento da guia deixa de existir. Empresas devem negociar linhas de crédito preventivas antes de 2027.
▸ Sazonalidade — Varejistas que usam o caixa do período forte (Natal, Dia das Mães) para bancar o período fraco perderão esse colchão. O planejamento de caixa sazonal precisa ser completamente revisto.
▸ Fornecedores no Simples Nacional — Fornecedores de moda no Simples transferem menos crédito de CBS/IBS. A cadeia de fornecimento precisa ser mapeada e, em alguns casos, renegociada.
▸ Filiais mesma raiz CNPJ — Grupo Veste: a liquidação centralizada via domicílio bancário unificado é essencial. O cadastro CGIBS precisa refletir corretamente cada filial para evitar retenção incorreta.
▸ Estoque e precificação — Com alíquotas mudando a cada etapa até 2033, política de preços e margens precisa ser revisada regularmente. Contratos de fornecimento devem incluir cláusula de revisão tributária.
▸ Créditos de IBS/CBS nas compras de coleção — O crédito sobre compras de mercadoria para revenda é garantido, mas depende de NF válida e CNPJ ativo do fornecedor. Qualificação cadastral da base de fornecedores é urgente.
▸ E-commerce — Margens já apertadas ficam mais pressionadas com o split. O valor líquido recebido por pedido cai. Revisar política de frete, parcelamento sem juros e campanhas de desconto.`,
